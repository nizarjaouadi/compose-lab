upstream backend_pool {
    server apache1:80;
    server apache2:80;
}

server {
    listen 80;

    location / {
        return 200 "Frontend via Docker Compose OK\n";
        add_header Content-Type text/plain;
    }

    location /api/ {
        proxy_pass http://backend_pool/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
